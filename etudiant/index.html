<!doctype html>

<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Tim'agine - Studio photo nature</title>

    <link rel="stylesheet" href="css/normalize.css" />
    <link
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300..900&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    <link rel="stylesheet" href="css/style.css" />

    <script src="js/monjs.js" defer></script>
  </head>

  <body>
    <!-- Entête -->
    <header class="header">
      <div class="wrapper">
        <a href="#" class="logo">Tim’agine</a>
        <button class="menu">
          <a href="#"><span class="material-icons">menu</span></a>
        </button>
      </div>
    </header>

    <section class="hero">
      <div class="wrapper"></div>
    </section>

    <!--Conteneur principal -->
    <section class="contenu">
      <div class="wrapper">
        <article class="card">
          <img class="image" src="images/photos/elephant.jpg" alt="Éléphant" />
          <button class="button">
            <a href="#"
              ><span class="material-symbols-outlined"> arrows_output </span></a
            >
          </button>
        </article>
        <article class="card">
          <img class="image" src="images/photos/bear.jpg" alt="Ours polaire" />
          <button class="button">
            <a href="#"
              ><span class="material-symbols-outlined"> arrows_output </span></a
            >
          </button>
        </article>
        <article class="card">
          <img class="image" src="images/photos/monkey.jpg" alt="Singe" />
          <button class="button">
            <a href="#"
              ><span class="material-symbols-outlined"> arrows_output </span></a
            >
          </button>
        </article>
        <article class="card">
          <img class="image" src="images/photos/owl.jpg" alt="Hiboux" />
          <button class="button">
            <a href="#"
              ><span class="material-symbols-outlined"> arrows_output </span></a
            >
          </button>
        </article>
        <article class="card">
          <img class="image" src="images/photos/dog.jpg" alt="Chien" />
          <button class="button">
            <a href="#"
              ><span class="material-symbols-outlined"> arrows_output </span></a
            >
          </button>
        </article>
        <article class="card">
          <img class="image" src="images/photos/pig.jpg" alt="Porcelet" />
          <button class="button">
            <a href="#"
              ><span class="material-symbols-outlined"> arrows_output </span></a
            >
          </button>
        </article>
        <article class="card">
          <img class="image" src="images/photos/hedgehog.jpg" alt="Hérisson" />
          <button class="button">
            <a href="#"
              ><span class="material-symbols-outlined"> arrows_output </span></a
            >
          </button>
        </article>
        <article class="card">
          <img class="image" src="images/photos/fennec.jpg" alt="Fennec" />
          <button class="button">
            <a href="#"
              ><span class="material-symbols-outlined"> arrows_output </span></a
            >
          </button>
        </article>
        <article class="card">
          <img
            class="image"
            src="images/photos/otter.jpg"
            alt="Loutre de mer"
          />
          <button class="button">
            <a href="#"
              ><span class="material-symbols-outlined"> arrows_output </span></a
            >
          </button>
        </article>
        <article class="card">
          <img class="image" src="images/photos/koala.jpg" alt="Koala" />
          <button class="button">
            <a href="#"
              ><span class="material-symbols-outlined"> arrows_output </span></a
            >
          </button>
        </article>
      </div>

      <!-- Photos -->
    </section>

    <!-- Pied de page -->
    <footer class="footer">
      <div class="wrapper">
        <p>Tous droits réservés © Studios Tim’agine</p>
      </div>
    </footer>

    <!-- Médias sociaux -->
    <nav class="media">
      <ul>
        <li>
          <a href="https://www.facebook.com/">
            <img src="images/interface/facebook.svg" alt="Facebook" />
          </a>
        </li>
        <li>
          <a href="https://www.youtube.com/">
            <img src="images/interface/youtube.svg" alt="YouTube" />
          </a>
        </li>
        <li>
          <a href="https://pinterest.com/">
            <img src="images/interface/pinterest.svg" alt="Pinterest" />
          </a>
        </li>
        <li>
          <a href="https://www.instagram.com/">
            <img src="images/interface/instagram.svg" alt="Instagram" />
          </a>
        </li>
        <li>
          <a href="https://fr.wikipedia.org/wiki/RSS">
            <img src="images/interface/rss.svg" alt="RSS" />
          </a>
        </li>
      </ul>
    </nav>
    <!--</div>-->

    <!-- Fenêtre modale -->
    <div class="modal"></div>
  </body>
</html>
